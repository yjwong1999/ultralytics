# Ultralytics YOLO 🚀, AGPL-3.0 license
# YOLOv5 object detection model with wide_resnet50_2 backbone

# Parameters
nc: 80 # number of classes

backbone:
  # [from, number, module, args]
  - [-1, 1, efficientnet_b11, [40]]
  - [-1, 1, efficientnet_b12, [112]]
  - [-1, 1, efficientnet_b13, [1280]]
  - [-1, 1, SPPF, [1024, 5]]

head:
  - [-1, 1, Conv, [512, 1, 1]]
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']]
  - [[-1, 1], 1, Concat, [1]]  # cat backbone P4
  - [-1, 3, C3, [512, False]]  # 7
  
  - [-1, 1, Conv, [256, 1, 1]]
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']]
  - [[-1, 0], 1, Concat, [1]]  # cat backbone P3
  - [-1, 3, C3, [256, False]]  # 11 (P3/8-small)
  
  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 7], 1, Concat, [1]]  # cat head P4
  - [-1, 3, C3, [512, False]]  # 14 (P4/16-medium)
  
  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 3], 1, Concat, [1]]  # cat head P5
  - [-1, 3, C3, [1024, False]]  # 17 (P5/32-large)
  
  - [[11, 14, 17], 1, Detect, [nc]]  # Detect(P3, P4, P5)
